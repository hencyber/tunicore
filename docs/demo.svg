<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="13">
<style>
  .bg { fill: #0d1117; }
  .bar { fill: #161b22; }
  .border { fill: none; stroke: #30363d; stroke-width: 1; }
  .title { fill: #8b949e; font-size: 12px; }
  .text { fill: #e6edf3; }
  .dim { fill: #484f58; }
  .prompt { fill: #7ee787; }
  .cmd { fill: #79c0ff; }
  .ok { fill: #3fb950; }
  .info { fill: #58a6ff; }
  .accent { fill: #d2a8ff; }
  .warn { fill: #f0883e; }
  .dot-r { fill: #ff5f56; }
  .dot-y { fill: #ffbd2e; }
  .dot-g { fill: #27c93f; }
  @keyframes t1 { 0%,5% { opacity:0 } 6%,100% { opacity:1 } }
  @keyframes t2 { 0%,14% { opacity:0 } 15%,100% { opacity:1 } }
  @keyframes t3 { 0%,24% { opacity:0 } 25%,100% { opacity:1 } }
  @keyframes t4 { 0%,36% { opacity:0 } 37%,100% { opacity:1 } }
  @keyframes t5 { 0%,50% { opacity:0 } 51%,100% { opacity:1 } }
  @keyframes t6 { 0%,62% { opacity:0 } 63%,100% { opacity:1 } }
  @keyframes t7 { 0%,72% { opacity:0 } 73%,100% { opacity:1 } }
  @keyframes t8 { 0%,82% { opacity:0 } 83%,100% { opacity:1 } }
  .s1 { animation: t1 30s infinite; opacity: 0; }
  .s2 { animation: t2 30s infinite; opacity: 0; }
  .s3 { animation: t3 30s infinite; opacity: 0; }
  .s4 { animation: t4 30s infinite; opacity: 0; }
  .s5 { animation: t5 30s infinite; opacity: 0; }
  .s6 { animation: t6 30s infinite; opacity: 0; }
  .s7 { animation: t7 30s infinite; opacity: 0; }
  .s8 { animation: t8 30s infinite; opacity: 0; }
</style>
<rect class="bg" width="820" height="560" rx="10"/>
<rect class="bar" width="820" height="36" rx="10 10 0 0"/>
<rect class="border" x="0.5" y="0.5" width="819" height="559" rx="10"/>
<circle class="dot-r" cx="18" cy="18" r="6"/>
<circle class="dot-y" cx="38" cy="18" r="6"/>
<circle class="dot-g" cx="58" cy="18" r="6"/>
<text class="title" x="410" y="22" text-anchor="middle">TuniCore v0.6.0 - QEMU x86_64</text>

<!-- Boot -->
<g class="s1">
<text class="dim" x="20" y="65">====== TuniCore v0.6.0 ======</text>
<text class="dim" x="20" y="82">Booting on x86_64...</text>
<text class="ok" x="20" y="99">  Serial  GDT  IDT  Heap  PMM  WASM ready</text>
</g>

<!-- show configuration -->
<g class="s2">
<text class="prompt" x="20" y="128">tc&gt; </text><text class="cmd" x="55" y="128">show configuration</text>
<text class="dim" x="20" y="148">  KEY              VALUE</text>
<text class="text" x="20" y="165">  hostname         <tspan class="info">tunicore</tspan></text>
<text class="text" x="20" y="182">  version          <tspan class="info">0.6.0</tspan></text>
<text class="text" x="20" y="199">  owner            <tspan class="info">tuncore</tspan></text>
<text class="text" x="20" y="216">  lang             <tspan class="info">en</tspan></text>
</g>

<!-- deploy greeter -->
<g class="s3">
<text class="prompt" x="20" y="245">tc&gt; </text><text class="cmd" x="55" y="245">deploy greeter</text>
<text class="dim" x="20" y="265">  [wasm] Loading agent: "greeter" (417 bytes)</text>
<text class="accent" x="20" y="282">  [agent:5] env_get('hostname') = tunicore</text>
<text class="accent" x="20" y="299">  [agent:5] env_get('owner') = tuncore</text>
<text class="ok" x="20" y="316">  Agent 'greeter' completed successfully.</text>
</g>

<!-- run writer analyzer -->
<g class="s4">
<text class="prompt" x="20" y="345">tc&gt; </text><text class="cmd" x="55" y="345">run writer analyzer</text>
<text class="dim" x="20" y="365">  --- Workflow: 2 agents ---</text>
<text class="ok" x="20" y="382">  [1/2] writer ok</text>
<text class="ok" x="20" y="399">  [2/2] analyzer ok</text>
<text class="dim" x="20" y="416">  --- Workflow complete: 2 ok, 0 failed ---</text>
</g>

<!-- typo -->
<g class="s5">
<text class="prompt" x="20" y="445">tc&gt; </text><text class="cmd" x="55" y="445">deply hello</text>
<text class="warn" x="20" y="465">  Unknown: 'deply'. Did you mean 'deploy'?</text>
</g>

<!-- ask AI -->
<g class="s6">
<text class="prompt" x="20" y="494">tc&gt; </text><text class="cmd" x="55" y="494">ask what is Rust?</text>
<text class="dim" x="20" y="514">  Thinking...</text>
<text class="accent" x="20" y="531">  Rust is a systems programming language designed for safety...</text>
</g>

</svg>
