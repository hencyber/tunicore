<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TuniCore v0.6.0 - Live Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  .terminal {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    width: 820px;
    box-shadow: 0 0 80px rgba(88, 166, 255, 0.08);
    overflow: hidden;
  }
  .titlebar {
    background: #161b22;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #21262d;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }
  .title {
    color: #8b949e;
    font-size: 13px;
    margin-left: 8px;
    flex: 1;
    text-align: center;
  }
  .content {
    padding: 20px;
    min-height: 520px;
    max-height: 520px;
    overflow: hidden;
  }
  #output {
    color: #e6edf3;
    font-size: 13.5px;
    line-height: 1.55;
    white-space: pre;
  }
  .prompt { color: #7ee787; }
  .cmd { color: #79c0ff; }
  .dim { color: #484f58; }
  .accent { color: #d2a8ff; }
  .warn { color: #f0883e; }
  .ok { color: #3fb950; }
  .info { color: #58a6ff; }
  .art { color: #bc8cff; }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #58a6ff;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <div class="title">TuniCore v0.6.0 - QEMU x86_64</div>
  </div>
  <div class="content">
    <div id="output"></div>
  </div>
</div>

<script>
const output = document.getElementById('output');
const steps = [
  { text: '<span class="dim">====== TuniCore v0.6.0 ======</span>\n<span class="dim">Booting on x86_64...</span>\n<span class="ok">  Serial  GDT  IDT  Heap  PMM</span>\n<span class="ok">  WASM runtime ready</span>\n<span class="ok">  Environment initialized</span>\n', delay: 1200 },

  { prompt: true, cmd: 'show configuration', delay: 80 },
  { text: '  <span class="dim">Environment (7 vars):</span>\n  <span class="dim">KEY              VALUE</span>\n  <span class="dim">---              -----</span>\n  hostname         <span class="info">tunicore</span>\n  version          <span class="info">0.6.0</span>\n  owner            <span class="info">tuncore</span>\n  arch             <span class="info">x86_64</span>\n  lang             <span class="info">en</span>\n  shell            <span class="info">intent/v2</span>\n', delay: 1500 },

  { prompt: true, cmd: 'set owner tuncore', delay: 70 },
  { text: '  owner = <span class="ok">tuncore</span>\n', delay: 800 },

  { prompt: true, cmd: 'deploy greeter', delay: 80 },
  { text: '  Deploying \'greeter\'...\n<span class="dim">[wasm] Loading agent: "greeter" (419 bytes)</span>\n<span class="accent">[agent:5] env_get(\'hostname\') = tunicore</span>\n<span class="accent">[agent:5] env_get(\'owner\') = tuncore</span>\n<span class="ok">[agent:5] Wrote 80 bytes to \'greeting.md\'</span>\n  Agent \'greeter\' completed <span class="ok">successfully</span>.\n', delay: 2000 },

  { prompt: true, cmd: 'cat greeting.md', delay: 70 },
  { text: '  <span class="info"># Welcome to TuniCore</span>\n  Owner: tuncore\n  Generated by: greeter.wasm\n  Status: ready\n', delay: 1500 },

  { clear: true, delay: 300 },
  { prompt: true, cmd: 'run writer analyzer', delay: 70 },
  { text: '  <span class="dim">--- Workflow: 2 agents ---</span>\n  [1/2] writer...\n<span class="ok">  [1/2] writer done</span>\n  [2/2] analyzer...\n<span class="ok">  [2/2] analyzer done</span>\n  <span class="dim">--- Workflow complete: 2 ok, 0 failed ---</span>\n', delay: 2500 },

  { prompt: true, cmd: 'deply hello', delay: 90 },
  { text: '  <span class="warn">Unknown: \'deply\'. Did you mean \'deploy\'?</span>\n', delay: 1800 },

  { prompt: true, cmd: 'alias report run writer analyzer', delay: 60 },
  { text: '  Alias \'report\' -> \'<span class="cmd">run writer analyzer</span>\'\n', delay: 1000 },

  { prompt: true, cmd: 'report', delay: 100 },
  { text: '  <span class="dim">-> run writer analyzer</span>\n  <span class="dim">--- Workflow: 2 agents ---</span>\n<span class="ok">  [1/2] writer done</span>\n<span class="ok">  [2/2] analyzer done</span>\n  <span class="dim">--- Workflow complete ---</span>\n', delay: 2000 },

  { clear: true, delay: 300 },
  { prompt: true, cmd: 'sysinfo', delay: 90 },
  { text: '\n  OS        TuniCore <span class="info">v0.6.0</span>\n  Host      <span class="info">tunicore</span>\n  Owner     <span class="info">tuncore</span>\n  Arch      x86_64\n  Uptime    ~0m 14s\n  Shell     intent/v2\n  Lang      en\n\n  RAM       <span class="ok">401/402 MiB free</span>\n  Files     3 (239 B)\n  Procs     1 active, 9 total\n  Agents    6 built-in\n  Commands  <span class="info">37 exact + NLP fuzzy + AI</span>\n', delay: 3500 },

  { prompt: true, cmd: 'ask what is Rust?', delay: 80 },
  { text: '  <span class="dim">Thinking...</span>\n  <span class="accent">Rust is a systems programming language designed for\n  safety and performance, created by Mozilla. It\n  guarantees memory safety without a garbage collector.</span>\n', delay: 3000 },

  { prompt: true, cmd: '', delay: 0, final: true },
];

let idx = 0;
let charIdx = 0;

function typeChar(text, cb) {
  if (charIdx >= text.length) { cb(); return; }
  const span = document.createElement('span');
  span.className = 'cmd';
  span.textContent = text[charIdx];
  output.appendChild(span);
  charIdx++;
  setTimeout(() => typeChar(text, cb), steps[idx]?.delay || 70);
}

function runStep() {
  if (idx >= steps.length) return;
  const step = steps[idx];

  if (step.clear) {
    output.innerHTML = '';
    idx++;
    setTimeout(runStep, step.delay);
    return;
  }

  if (step.prompt) {
    output.innerHTML += '<span class="prompt">tc&gt; </span>';
    if (step.final) {
      output.innerHTML += '<span class="cursor"></span>';
      return;
    }
    charIdx = 0;
    typeChar(step.cmd, () => {
      output.innerHTML += '\n';
      idx++;
      setTimeout(runStep, 400);
    });
    return;
  }

  output.innerHTML += step.text;
  const content = output.parentElement;
  content.scrollTop = content.scrollHeight;
  idx++;
  setTimeout(runStep, step.delay);
}

setTimeout(runStep, 800);
</script>
</body>
</html>
